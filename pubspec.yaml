name: flutter_application_1
description: "SmartChat - Real-Time Chat Application with AI Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking (for AI API)
  http: ^1.3.0

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  flutter_dotenv: ^6.0.1
  record: ^6.2.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  firebase_storage: ^13.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - .env
